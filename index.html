<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f1a">
<title>我的每日行事曆</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f1a; --surface: #1a1a2e; --card: #16213e;
    --accent: #e94560; --accent2: #0f3460; --gold: #f5a623;
    --green: #4ecca3; --school: #38b2f5; --text: #eaeaea;
    --muted: #888aaa; --border: rgba(255,255,255,0.08); --radius: 16px;
    --glass-bg: rgba(255,255,255,0.10);
    --glass-border: rgba(255,255,255,0.22);
    --glass-shadow: 0 4px 24px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.18);
    --glass-blur: blur(18px) saturate(1.6);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; transition: background 1.2s ease; }
  #bgLayer { position: fixed; inset: 0; z-index: 0; background-size: cover; background-position: center; opacity: 0.18; pointer-events: none; }
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(233,69,96,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(233,69,96,0.04) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
  .wrapper { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 0 100px; }

  /* Header */
  .header { padding: 24px 20px 16px; display: flex; flex-direction: column; gap: 4px; }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .app-title { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; }
  .date-display { font-size: 28px; font-weight: 700; line-height: 1.1; }
  .date-sub { font-size: 12px; color: var(--muted); margin-top: 2px; font-family: 'Space Mono', monospace; }
  .mood-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-family: 'Space Mono', monospace; color: var(--muted); padding: 3px 8px; border-radius: 20px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); margin-top: 6px; }
  .nav-btn { background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow); color: var(--text); width: 36px; height: 36px; border-radius: 10px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .nav-btn:active { transform: scale(0.92); }
  .today-btn { background: rgba(233,69,96,0.35); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid rgba(233,69,96,0.55); box-shadow: 0 4px 18px rgba(233,69,96,0.25), inset 0 1px 0 rgba(255,255,255,0.2); color: white; padding: 0 14px; height: 36px; border-radius: 10px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Space Mono', monospace; letter-spacing: 1px; transition: all 0.2s; }

  /* Day tabs */
  .day-tabs { display: flex; gap: 6px; padding: 0 20px 16px; overflow-x: auto; scrollbar-width: none; }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-tab { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 12px; border-radius: 14px; background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow); cursor: pointer; transition: all 0.2s; min-width: 52px; position: relative; }
  .day-tab.active { background: rgba(233,69,96,0.32); border-color: rgba(233,69,96,0.6); box-shadow: 0 4px 20px rgba(233,69,96,0.3), inset 0 1px 0 rgba(255,255,255,0.25); }
  .day-tab:active { transform: scale(0.93); }
  .day-tab.has-school-event::after { content: '🏫'; position: absolute; top: -6px; right: -4px; font-size: 12px; }
  .tab-name { font-size: 10px; font-family: 'Space Mono', monospace; color: var(--muted); letter-spacing: 1px; }
  .day-tab.active .tab-name { color: rgba(255,255,255,0.8); }
  .tab-date { font-size: 18px; font-weight: 700; }
  .tab-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--green); opacity: 0; }
  .tab-dot.has-note { opacity: 1; }

  /* Sections */
  .section { margin: 0 20px 16px; animation: fadeUp 0.35s ease both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .section-label { font-size: 10px; font-family: 'Space Mono', monospace; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* School Events */
  .school-events-card { background: linear-gradient(135deg, #0d1e2e, #0a1929); border: 1px solid rgba(56,178,245,0.35); border-radius: var(--radius); overflow: hidden; }
  .school-event-item { padding: 14px 16px; border-bottom: 1px solid rgba(56,178,245,0.1); display: flex; gap: 12px; align-items: flex-start; }
  .school-event-item:last-child { border-bottom: none; }
  .school-event-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--school); margin-top: 5px; flex-shrink: 0; box-shadow: 0 0 8px rgba(56,178,245,0.6); }
  .school-event-body { flex: 1; }
  .school-event-title { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
  .school-event-note { font-size: 12px; color: var(--muted); line-height: 1.4; }
  .school-event-time { font-size: 10px; font-family: 'Space Mono', monospace; color: var(--school); background: rgba(56,178,245,0.1); padding: 2px 8px; border-radius: 20px; margin-top: 4px; display: inline-block; }
  .countdown-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-family: 'Space Mono', monospace; padding: 3px 10px; border-radius: 20px; margin-top: 6px; font-weight: 700; }
  .countdown-badge.urgent { background: rgba(233,69,96,0.2); color: var(--accent); border: 1px solid rgba(233,69,96,0.4); animation: urgentPulse 1.5s ease infinite; }
  .countdown-badge.soon { background: rgba(245,166,35,0.15); color: var(--gold); border: 1px solid rgba(245,166,35,0.35); }
  @keyframes urgentPulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

  /* Morning */
  .morning-card { background: linear-gradient(135deg, #1a1a2e, #16213e); border: 1px solid rgba(78,204,163,0.2); border-radius: var(--radius); padding: 16px; position: relative; overflow: hidden; }
  .morning-card::before { content: '☀'; position: absolute; right: 16px; top: 12px; font-size: 32px; opacity: 0.08; }
  .routine-items { display: flex; flex-direction: column; gap: 8px; }
  .routine-item { display: flex; align-items: center; gap: 10px; }
  .routine-icon { width: 28px; height: 28px; border-radius: 8px; background: rgba(78,204,163,0.12); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .routine-text { font-size: 13px; }
  .routine-badge { font-size: 10px; background: rgba(78,204,163,0.15); color: var(--green); padding: 2px 7px; border-radius: 20px; font-family: 'Space Mono', monospace; margin-left: auto; flex-shrink: 0; }
  .breakfast-card { background: linear-gradient(135deg, #1a1420, #1e1628); border: 1px solid rgba(245,166,35,0.25); border-radius: var(--radius); padding: 16px; display: flex; gap: 14px; align-items: center; margin-top: 10px; }
  .breakfast-emoji { font-size: 36px; flex-shrink: 0; }
  .breakfast-info { flex: 1; }
  .breakfast-label { font-size: 9px; font-family: 'Space Mono', monospace; letter-spacing: 2px; color: var(--gold); margin-bottom: 4px; }
  .breakfast-name { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
  .breakfast-drink { font-size: 12px; color: var(--muted); }
  .breakfast-tag { font-size: 9px; background: rgba(245,166,35,0.12); color: var(--gold); padding: 3px 8px; border-radius: 20px; font-family: 'Space Mono', monospace; margin-top: 6px; display: inline-block; }
  .reroll-btn { background: rgba(245,166,35,0.18); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid rgba(245,166,35,0.4); box-shadow: 0 2px 12px rgba(245,166,35,0.15), inset 0 1px 0 rgba(255,255,255,0.15); color: var(--gold); width: 34px; height: 34px; border-radius: 10px; font-size: 18px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .reroll-btn:active { transform: rotate(180deg) scale(0.9); }

  /* Schedule */
  .schedule-block { display: flex; gap: 8px; margin-bottom: 8px; animation: fadeUp 0.3s ease both; align-items: stretch; }
  .time-col { width: 48px; flex-shrink: 0; text-align: right; padding-top: 12px; }
  .time-text { font-size: 10px; font-family: 'Space Mono', monospace; color: var(--muted); line-height: 1.3; }
  .class-card { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; border-left: 3px solid var(--accent2); transition: all 0.2s; }
  .class-card.break-card { background: rgba(255,255,255,0.03); border-left-color: transparent; padding: 8px 14px; }
  .class-card.special { border-left-color: var(--green); background: linear-gradient(135deg, #16213e, #12293a); }
  .class-card.lunch { border-left-color: var(--gold); background: linear-gradient(135deg, #1e1a10, #221e12); }
  .class-card.free { border-left-color: var(--accent); background: linear-gradient(135deg, #1e0f14, #221016); }
  .pbl-card { border-left-color: #9b5de5 !important; background: linear-gradient(135deg, #16122a, #1a1535) !important; }
  .class-name { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
  .class-meta { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; }
  .break-text { font-size: 11px; color: var(--muted); font-style: italic; }
  .free-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--accent); background: rgba(233,69,96,0.1); padding: 3px 8px; border-radius: 20px; font-family: 'Space Mono', monospace; }

  /* Edit mode */
  .slot-actions { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; padding-top: 8px; }
  .slot-edit-btn, .slot-del-btn { border: none; border-radius: 8px; cursor: pointer; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 13px; transition: all 0.2s; }
  .slot-edit-btn { background: rgba(78,204,163,0.15); color: var(--green); border: 1px solid rgba(78,204,163,0.3); }
  .slot-del-btn { background: rgba(233,69,96,0.12); color: var(--accent); border: 1px solid rgba(233,69,96,0.25); }
  .slot-edit-btn:active, .slot-del-btn:active { transform: scale(0.88); }
  .add-slot-btn { width: 100%; background: rgba(78,204,163,0.08); border: 1px dashed rgba(78,204,163,0.35); border-radius: 12px; color: var(--green); padding: 11px; font-size: 13px; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; transition: all 0.2s; margin-top: 6px; }
  .add-slot-btn:active { background: rgba(78,204,163,0.15); }
  .edit-schedule-toggle { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: var(--muted); padding: 4px 10px; border-radius: 20px; font-size: 10px; font-family: 'Space Mono', monospace; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .edit-schedule-toggle.active { background: rgba(78,204,163,0.15); border-color: rgba(78,204,163,0.4); color: var(--green); }

  /* Notes */
  .notes-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .notes-header { padding: 12px 16px 8px; display: flex; justify-content: space-between; align-items: center; }
  .notes-title { font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
  .notes-count { font-size: 10px; font-family: 'Space Mono', monospace; color: var(--muted); }
  .add-note-btn { background: rgba(233,69,96,0.25); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid rgba(233,69,96,0.45); color: white; width: 28px; height: 28px; border-radius: 8px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; line-height: 1; }
  .add-note-btn:active { transform: scale(0.88); }
  .notes-list { padding: 0 16px 12px; display: flex; flex-direction: column; gap: 8px; }
  .note-item { background: rgba(255,255,255,0.04); border-radius: 10px; padding: 10px 12px; display: flex; gap: 10px; align-items: flex-start; }
  .note-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-top: 5px; flex-shrink: 0; }
  .note-text { font-size: 13px; line-height: 1.5; flex: 1; word-break: break-word; }
  .note-delete { background: none; border: none; color: var(--muted); font-size: 16px; cursor: pointer; padding: 0; line-height: 1; flex-shrink: 0; }
  .notes-empty { font-size: 12px; color: var(--muted); font-style: italic; padding: 4px 0 8px; }

  /* Fact */
  .fact-card { background: linear-gradient(135deg, #0e1f2e, #122030); border: 1px solid rgba(78,204,163,0.3); border-radius: var(--radius); padding: 16px; position: relative; overflow: hidden; }
  .fact-card::before { content: '💡'; position: absolute; right: 14px; top: 12px; font-size: 28px; opacity: 0.1; }
  .fact-label { font-size: 9px; font-family: 'Space Mono', monospace; letter-spacing: 2px; color: var(--green); margin-bottom: 8px; text-transform: uppercase; }
  .fact-text { font-size: 13px; line-height: 1.6; }
  .fact-actions { display: flex; gap: 8px; margin-top: 12px; align-items: center; }
  .fact-link-btn { background: rgba(78,204,163,0.15); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid rgba(78,204,163,0.35); color: var(--green); padding: 6px 12px; border-radius: 20px; font-size: 11px; font-family: 'Space Mono', monospace; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; flex: 1; justify-content: center; }
  .fact-refresh-btn { background: rgba(255,255,255,0.10); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid rgba(255,255,255,0.20); color: var(--muted); width: 32px; height: 32px; border-radius: 10px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; flex-shrink: 0; }
  .fact-refresh-btn:active { transform: rotate(360deg); }

  /* Sports */
  .sports-card { background: linear-gradient(135deg, #1a0f2e, #1e1235); border: 1px solid rgba(155,93,229,0.3); border-radius: var(--radius); padding: 16px; }
  .sports-label { font-size: 9px; font-family: 'Space Mono', monospace; letter-spacing: 2px; color: #9b5de5; margin-bottom: 10px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
  .sports-type-pills { display: flex; gap: 6px; margin-bottom: 12px; }
  .sports-pill { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-family: 'Space Mono', monospace; cursor: pointer; background: rgba(255,255,255,0.08); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid rgba(255,255,255,0.15); color: var(--muted); transition: all 0.2s; }
  .sports-pill.active { background: rgba(155,93,229,0.28); border-color: rgba(155,93,229,0.55); color: #9b5de5; }
  .sports-item { background: rgba(255,255,255,0.04); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; text-decoration: none; display: block; }
  .sports-item:active { background: rgba(155,93,229,0.1); }
  .sports-headline { font-size: 13px; font-weight: 500; line-height: 1.4; color: var(--text); }
  .sports-meta { font-size: 10px; color: var(--muted); font-family: 'Space Mono', monospace; margin-top: 4px; }
  .sports-refresh-btn { background: rgba(155,93,229,0.18); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid rgba(155,93,229,0.38); color: #9b5de5; width: 28px; height: 28px; border-radius: 8px; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; margin-left: auto; }
  .sports-refresh-btn:active { transform: rotate(360deg); }

  /* AI FAB */
  .ai-fab { position: fixed; bottom: 90px; right: 20px; width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg, #e94560, #9b5de5); border: none; color: white; font-size: 22px; cursor: pointer; z-index: 60; box-shadow: 0 4px 20px rgba(233,69,96,0.4); display: flex; align-items: center; justify-content: center; transition: all 0.3s; animation: aiPulse 3s ease infinite; }
  @keyframes aiPulse { 0%,100%{box-shadow:0 4px 20px rgba(233,69,96,0.4)} 50%{box-shadow:0 4px 30px rgba(155,93,229,0.6)} }

  /* AI Panel */
  .ai-panel { position: fixed; inset: 0; z-index: 200; display: flex; flex-direction: column; background: rgba(10,10,20,0.97); backdrop-filter: blur(20px); transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.34,1.2,0.64,1); }
  .ai-panel.open { transform: translateY(0); }
  .ai-header { padding: 20px 20px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .ai-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #e94560, #9b5de5); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .ai-title-block { flex: 1; }
  .ai-title { font-size: 14px; font-weight: 700; }
  .ai-subtitle { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; }
  .ai-close { background: rgba(255,255,255,0.08); border: none; color: var(--text); width: 32px; height: 32px; border-radius: 10px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .ai-messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
  .ai-msg { display: flex; gap: 10px; align-items: flex-start; animation: fadeUp 0.3s ease both; }
  .ai-msg.user { flex-direction: row-reverse; }
  .ai-msg-bubble { max-width: 80%; padding: 10px 14px; border-radius: 16px; font-size: 13px; line-height: 1.5; }
  .ai-msg.bot .ai-msg-bubble { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .ai-msg.user .ai-msg-bubble { background: linear-gradient(135deg, #e94560, #9b5de5); border-bottom-right-radius: 4px; }
  .ai-msg-icon { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; background: var(--surface); border: 1px solid var(--border); }
  .ai-msg.user .ai-msg-icon { background: linear-gradient(135deg, #e94560, #9b5de5); border: none; }
  .ai-typing { display: flex; gap: 4px; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; border-bottom-left-radius: 4px; width: fit-content; }
  .ai-typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: typingDot 1.4s ease infinite; }
  .ai-typing span:nth-child(2) { animation-delay: 0.2s; }
  .ai-typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingDot { 0%,80%,100%{transform:scale(0.6);opacity:0.4} 40%{transform:scale(1);opacity:1} }
  .ai-suggestions { display: flex; gap: 6px; padding: 8px 20px; overflow-x: auto; scrollbar-width: none; }
  .ai-suggestions::-webkit-scrollbar { display: none; }
  .ai-suggest-chip { flex-shrink: 0; background: rgba(255,255,255,0.10); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid rgba(255,255,255,0.20); border-radius: 20px; padding: 6px 12px; font-size: 12px; cursor: pointer; white-space: nowrap; color: var(--text); }
  .ai-input-bar { padding: 12px 20px 32px; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-end; }
  .ai-input { flex: 1; background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: 14px; padding: 10px 14px; color: var(--text); font-size: 14px; font-family: 'Noto Sans TC', sans-serif; resize: none; min-height: 42px; max-height: 120px; outline: none; }
  .ai-input:focus { border-color: var(--accent); }
  .ai-send { background: linear-gradient(135deg, #e94560, #9b5de5); border: none; color: white; width: 42px; height: 42px; border-radius: 12px; font-size: 18px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }

  /* Modals */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 100; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal-box { background: var(--surface); border-radius: 24px 24px 0 0; padding: 20px 20px 40px; width: 100%; border-top: 1px solid var(--border); transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); }
  .modal-overlay.open .modal-box { transform: translateY(0); }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 4px; margin: 0 auto 16px; }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; }

// ═══ STATE ═══
let today = new Date(); today.setHours(0,0,0,0);
let selectedDate = new Date(today);
let weekOffset = 0;
let notes = JSON.parse(localStorage.getItem('cal_notes') || '{}');
let breakfastCache = JSON.parse(localStorage.getItem('cal_bf') || '{}');
let schoolEvents = JSON.parse(localStorage.getItem('cal_school_events') || '[]');
let currentSportsType = 'soccer';
let sportsCache = {};
let dailyFactIdx = null;
let aiHistory = [];
let scheduleEditing = false;

// Custom schedules
// weekSchedule[wi] overrides DEFAULT_SCHEDULE[wi] for that weekday (wi: 0=Mon..4=Fri)
// daySchedule[dk] overrides for a specific date only
let weekSchedule = JSON.parse(localStorage.getItem('cal_week_schedule') || '{}');
let daySchedule  = JSON.parse(localStorage.getItem('cal_day_schedule')  || '{}');
function saveSchedules() {
  localStorage.setItem('cal_week_schedule', JSON.stringify(weekSchedule));
  localStorage.setItem('cal_day_schedule',  JSON.stringify(daySchedule));
}
function getScheduleForDay(dayOfWeek, dk) {
  if (daySchedule[dk]) return JSON.parse(JSON.stringify(daySchedule[dk]));
  const wi = dayOfWeek - 1;
  if (weekSchedule[wi]) return JSON.parse(JSON.stringify(weekSchedule[wi]));
  if (DEFAULT_SCHEDULE[wi]) return JSON.parse(JSON.stringify(DEFAULT_SCHEDULE[wi]));
  return [];
}

// ═══ SLOT EDIT MODAL ═══
let editingSlotDk  = null;
let editingSlotIdx = null;
let applyScope = 'today';

function openSlotModal(dk, slotIdx) {
  editingSlotDk  = dk;
  editingSlotIdx = slotIdx;
  applyScope = 'today';
  selectApply('today');
  const dow   = new Date(dk + 'T00:00:00').getDay();
  const slots = getScheduleForDay(dow, dk);
  if (slotIdx !== null && slotIdx < slots.length) {
    const s = slots[slotIdx];
    document.getElementById('slotModalTitle').textContent = '✏️ 編輯課程';
    document.getElementById('slotTimeInput').value = s.time;
    document.getElementById('slotNameInput').value = s.name;
    document.getElementById('slotTypeInput').value = s.type;
  } else {
    document.getElementById('slotModalTitle').textContent = '➕ 新增課程';
    document.getElementById('slotTimeInput').value = '';
    document.getElementById('slotNameInput').value = '';
    document.getElementById('slotTypeInput').value = 'class';
  }
  document.getElementById('slotModalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('slotNameInput').focus(), 350);
}
function closeSlotModal() {
  document.getElementById('slotModalOverlay').classList.remove('open');
  editingSlotDk = null; editingSlotIdx = null;
}
function selectApply(scope) {
  applyScope = scope;
  document.getElementById('applyTodayBtn').classList.toggle('selected', scope === 'today');
  document.getElementById('applyWeekBtn').classList.toggle('selected', scope === 'week');
}
function saveSlot() {
  const time = document.getElementById('slotTimeInput').value;
  const name = document.getElementById('slotNameInput').value.trim();
  const type = document.getElementById('slotTypeInput').value;
  if (!name) {
    document.getElementById('slotNameInput').style.borderColor = 'var(--accent)';
    setTimeout(() => document.getElementById('slotNameInput').style.borderColor = '', 1500);
    return;
  }
  const dk  = editingSlotDk;
  const dow = new Date(dk + 'T00:00:00').getDay();
  const wi  = dow - 1;
  const newSlot = { time: time || '08:00', name, type };

  if (applyScope === 'today') {
    let slots = getScheduleForDay(dow, dk);
    if (editingSlotIdx !== null) slots[editingSlotIdx] = newSlot;
    else slots.push(newSlot);
    slots.sort((a, b) => a.time.localeCompare(b.time));
    daySchedule[dk] = slots;
  } else {
    let base = weekSchedule[wi] ? JSON.parse(JSON.stringify(weekSchedule[wi]))
             : (DEFAULT_SCHEDULE[wi] ? JSON.parse(JSON.stringify(DEFAULT_SCHEDULE[wi])) : []);
    if (editingSlotIdx !== null) {
      const cur = getScheduleForDay(dow, dk);
      const old = cur[editingSlotIdx];
      const mi  = base.findIndex(s => s.time === old.time && s.name === old.name);
      if (mi >= 0) base[mi] = newSlot; else base.push(newSlot);
    } else {
      base.push(newSlot);
    }
    base.sort((a, b) => a.time.localeCompare(b.time));
    weekSchedule[wi] = base;
    delete daySchedule[dk];
  }
  saveSchedules();
  closeSlotModal();
  render();
}
function deleteSlot(dk, slotIdx) {
  const dow   = new Date(dk + 'T00:00:00').getDay();
  const slots = getScheduleForDay(dow, dk);
  slots.splice(slotIdx, 1);
  daySchedule[dk] = slots;
  saveSchedules();
  render();
}

function getCountdown(dateStr) {
  const event = new Date(dateStr + 'T00:00:00');
  const diff = Math.round((event - today) / 86400000);
  if (diff < 0) return null;
  if (diff === 0) return { label: '🎉 今天！', cls: 'urgent' };
  if (diff === 1) return { label: '⚡ 明天！', cls: 'urgent' };
  if (diff <= 7) return { label: `還有 ${diff} 天`, cls: 'urgent' };
  if (diff <= 14) return { label: `還有 ${diff} 天`, cls: 'soon' };
  return null;
}

// ═══ SCHOOL EVENTS ═══
function saveSchoolEvents() { localStorage.setItem('cal_school_events', JSON.stringify(schoolEvents)); updateSchoolBadge(); }
function getEventsForDate(ds) { return schoolEvents.filter(e => e.date === ds); }
function updateSchoolBadge() {
  const up = schoolEvents.filter(e => e.date >= dateKey(today));
  const b  = document.getElementById('schoolBadge');
  if (up.length > 0) { b.style.display = 'flex'; b.textContent = up.length; } else { b.style.display = 'none'; }
}
function addSchoolEvent() {
  const title = document.getElementById('eventTitle').value.trim();
  const date  = document.getElementById('eventDate').value;
  const time  = document.getElementById('eventTime').value;
  const note  = document.getElementById('eventNote').value.trim();

    document.getElementById('eventTitle').style.borderColor = 'var(--accent)';
    setTimeout(() => document.getElementById('eventTitle').style.borderColor = '', 1500);
    return;
  }
  schoolEvents.push({ id: Date.now(), title, date, time, note });
  schoolEvents.sort((a, b) => a.date.localeCompare(b.date));

  st.classList.add('show'); setTimeout(() => st.classList.remove('show'), 3000);
  renderAdminEvents(); render();
}
function deleteSchoolEvent(id) { schoolEvents = schoolEvents.filter(e => e.id !== id); saveSchoolEvents(); renderAdminEvents(); render(); }
function renderAdminEvents() {
  const list = document.getElementById('adminEventsList');
  if (!schoolEvents.length) { list.innerHTML = '<div class="admin-empty">還沒有學校活動<br>在上方新增第一個吧！</div>'; return; }
  list.innerHTML = schoolEvents.map(e => {

    return `<div class="admin-event-item">

        <div class="admin-event-title">${escHtml(e.title)}</div>
        <div class="admin-event-date">${d.getMonth()+1}月${d.getDate()}日 (週${DAYS_TW[d.getDay()]})${e.time?' · '+e.time:''}</div>
        ${e.note ? `<div class="admin-event-note">${escHtml(e.note)}</div>` : ''}

      <button class="admin-event-delete" onclick="deleteSchoolEvent(${e.id})">✕</button>
    </div>`;

function applyBackground(dow) {

// ═══ BREAKFAST ═══
function getBreakfast(dk, forceRandom = false) {
  if (!forceRandom && breakfastCache[dk] !== undefined) return breakfastCache[dk];
  let seed = dk.split('-').reduce((a, b) => a * 31 + parseInt(b), 0);
  if (forceRandom) seed = Math.floor(Math.random() * 99999);
  const idx = ((seed % BREAKFASTS.length) + BREAKFASTS.length) % BREAKFASTS.length;
  breakfastCache[dk] = idx;
  localStorage.setItem('cal_bf', JSON.stringify(breakfastCache));
  return idx;
}
function rerollBreakfast(dk) { getBreakfast(dk, true); renderDayContent(); }

// ═══ FACTS ═══
function getDailyFactIdx(dk) {
  const sessionKey = 'cal_fact_session';
  const session = JSON.parse(localStorage.getItem(sessionKey) || '{}');
  if (session.date === dk && dailyFactIdx !== null) return dailyFactIdx;
  if (dailyFactIdx === null) {
    dailyFactIdx = Math.floor(Math.random() * FALLBACK_FACTS.length);
    localStorage.setItem(sessionKey, JSON.stringify({ date: dk, idx: dailyFactIdx }));
  }
  return dailyFactIdx;
}
function refreshFact(dk) {
  dailyFactIdx = Math.floor(Math.random() * FALLBACK_FACTS.length);
  localStorage.setItem('cal_fact_session', JSON.stringify({ date: dk, idx: dailyFactIdx }));
  renderDayContent();
}

// ═══ SPORTS ═══
function getSportsNews(type, dk) {
  const key = `${type}_${dk}`;
  if (sportsCache[key]) return sportsCache[key];
  const s = [...SPORTS_NEWS[type]].sort(() => Math.random() - 0.5).slice(0, 3);
  sportsCache[key] = s; return s;
}
function refreshSports(dk) { delete sportsCache[`${currentSportsType}_${dk}`]; renderDayContent(); }
function switchSportsType(t) { currentSportsType = t; renderDayContent(); }

// ═══ DATE UTILS ═══
function dateKey(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function getMondayOfWeek(d) { const day=d.getDay(); const diff=day===0?-6:1-day; const m=new Date(d); m.setDate(d.getDate()+diff); m.setHours(0,0,0,0); return m; }
function getWeekDates(mon) { return Array.from({length:7},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d; }); }
function getWeekNum(d) { const j=new Date(d.getFullYear(),0,1); return Math.ceil(((d-j)/86400000+j.getDay()+1)/7); }
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

// ═══ RENDER ═══
function render() {
  const bm = getMondayOfWeek(today);
  bm.setDate(bm.getDate() + weekOffset * 7);
  const wd = getWeekDates(bm);
  const dk = dateKey(selectedDate);
  document.getElementById('mainDate').textContent = `${selectedDate.getMonth()+1}月${selectedDate.getDate()}日 (${DAYS_TW[selectedDate.getDay()]})`;
  document.getElementById('mainDateSub').textContent = selectedDate.getFullYear() + ' · 第' + getWeekNum(selectedDate) + '週';
  applyBackground(selectedDate.getDay());
  const tabs = document.getElementById('dayTabs');
  tabs.innerHTML = '';
  wd.slice(1, 6).forEach(d => {
    const k = dateKey(d), isActive = k === dk, hasNote = notes[k]?.length > 0;
    const isToday = k === dateKey(today), dayEvents = getEventsForDate(k);
    const tab = document.createElement('div');
    tab.className = 'day-tab' + (isActive ? ' active' : '') + (dayEvents.length ? ' has-school-event' : '');
    tab.innerHTML = `<div class="tab-name">${DAYS_EN[d.getDay()]}</div><div class="tab-date" style="${isToday&&!isActive?'color:var(--accent)':''}">${d.getDate()}</div><div class="tab-dot${hasNote?' has-note':''}"></div>`;
    tab.onclick = () => { selectedDate = new Date(d); render(); };
    tabs.appendChild(tab);
  });
  renderDayContent();
  updateSchoolBadge();
}

function renderDayContent() {
  const dk  = dateKey(selectedDate);
  const dow = selectedDate.getDay();
  const isWeekday = dow >= 1 && dow <= 5;
  const bf  = BREAKFASTS[getBreakfast(dk)];
  const dayNotes  = notes[dk] || [];
  const fact = FALLBACK_FACTS[getDailyFactIdx(dk)];
  const dayEvents = getEventsForDate(dk);
  const slots = isWeekday ? getScheduleForDay(dow, dk) : [];
  let html = '';

  // ── 即將到來的活動倒數 ──
  const upcomingEvents = schoolEvents.filter(e => {
    const diff = Math.round((new Date(e.date + 'T00:00:00') - today) / 86400000);
    return diff >= 0 && diff <= 7;
  });
  if (upcomingEvents.length) {
    html += `<div class="section"><div class="section-label">⏰ 即將到來</div><div class="school-events-card">`;
    upcomingEvents.forEach(e => {
      const diff = Math.round((new Date(e.date + 'T00:00:00') - today) / 86400000);
      const label = diff === 0 ? '🎉 今天！' : diff === 1 ? '⚡ 明天！' : `還有 ${diff} 天`;
      const cls = diff <= 2 ? 'urgent' : 'soon';
      const d = new Date(e.date + 'T00:00:00');
      html += `<div class="school-event-item">
        <div class="school-event-dot"></div>
        <div class="school-event-body">
          <div class="school-event-title">${escHtml(e.title)}</div>
          <div class="school-event-note">${d.getMonth()+1}月${d.getDate()}日 (週${DAYS_TW[d.getDay()]})${e.time?' · '+e.time:''}</div>
          <div class="countdown-badge ${cls}">${label}</div>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  }

  // School Events
  if (dayEvents.length) {
    html += `<div class="section"><div class="section-label">🏫 學校活動</div><div class="school-events-card">`;
    dayEvents.forEach(e => {
      html += `<div class="school-event-item">
        <div class="school-event-dot"></div>
        <div class="school-event-body">
          <div class="school-event-title">${escHtml(e.title)}</div>
          ${e.note?`<div class="school-event-note">${escHtml(e.note)}</div>`:''}
          ${e.time?`<div class="school-event-time">⏰ ${e.time}</div>`:''}
          ${(()=>{ const cd=getCountdown(e.date); return cd?`<div class="countdown-badge ${cd.cls}">${cd.label}</div>`:''; })()}
        </div>
        <button onclick="deleteSchoolEvent(${e.id})" style="background:rgba(233,69,96,0.15);border:1px solid rgba(233,69,96,0.3);color:var(--accent);width:24px;height:24px;border-radius:6px;font-size:12px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;">✕</button>
      </div>`;
    });
    html += `</div></div>`;
  }

  // Morning + Breakfast
  html += `<div class="section"><div class="section-label">晨間例行公事</div><div class="morning-card"><div class="routine-items">
    <div class="routine-item"><div class="routine-icon">🌅</div><div class="routine-text">起床、換衣服</div><div class="routine-badge">起床</div></div>
    <div class="routine-item"><div class="routine-icon">💪</div><div class="routine-text">伏地挺身 5 下</div><div class="routine-badge">×5</div></div>
    <div class="routine-item"><div class="routine-icon">🦵</div><div class="routine-text">仰臥起坐 5 下</div><div class="routine-badge">×5</div></div>
    <div class="routine-item"><div class="routine-icon">🤸</div><div class="routine-text">開合跳 100 下</div><div class="routine-badge">×100</div></div>
    <div class="routine-item"><div class="routine-icon">🏪</div><div class="routine-text">去全家買早餐</div><div class="routine-badge">早餐</div></div>
  </div>
  <div class="breakfast-card">
    <div class="breakfast-emoji">${bf.emoji}</div>
    <div class="breakfast-info">
      <div class="breakfast-label">TODAY'S BREAKFAST</div>
      <div class="breakfast-name">${bf.name}</div>
      <div class="breakfast-drink">🥛 ${bf.drink}</div>
      <div class="breakfast-tag">${bf.tag}</div>
    </div>
    <button class="reroll-btn" onclick="rerollBreakfast('${dk}')">🔀</button>
  </div></div></div>`;

  // Schedule
  if (isWeekday) {
    html += `<div class="section">

        <button class="fact-refresh-btn" onclick="refreshFact('${dk}')">🔀</button>

  // Sports
  const si = getSportsNews(currentSportsType, dk);

    <div class="sports-card">
      <div class="sports-label" style="justify-content:space-between;"><span>🏆 TODAY IN SPORTS</span><button class="sports-refresh-btn" onclick="refreshSports('${dk}')">🔀</button></div>

        <div class="sports-pill ${currentSportsType==='baseball'?'active':''}" onclick="switchSportsType('baseball')">⚾ 棒球</div>

  si.forEach(item => { html += `<a href="${item.url}" target="_blank" class="sports-item"><div class="sports-headline">${item.title}</div><div class="sports-meta">${item.source} · 點擊查看更多 ↗</div></a>`; });
  html += `</div></div>`;

  // Notes
  html += `<div class="section"><div class="section-label">筆記</div>
    <div class="notes-card">
      <div class="notes-header">
        <div class="notes-title">📌 今日備註</div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="notes-count">${dayNotes.length} 則</span>
          <button class="add-note-btn" onclick="openModal('${dk}')">+</button>
        </div>
      </div>
      <div class="notes-list">`;
  if (!dayNotes.length) { html += `<div class="notes-empty">還沒有筆記，點 + 新增一則吧</div>`; }
  else { dayNotes.forEach((n, i) => { html += `<div class="note-item"><div class="note-dot"></div><div class="note-text">${escHtml(n)}</div><button class="note-delete" onclick="deleteNote('${dk}',${i})">×</button></div>`; }); }
  html += `</div></div></div>`;

  document.getElementById('dayContent').innerHTML = html;
}

function toggleEditSchedule() { scheduleEditing = !scheduleEditing; renderDayContent(); }

// ═══ NAVIGATION ═══
function changeWeek(dir) {
  weekOffset += dir;
  const bm = getMondayOfWeek(today); bm.setDate(bm.getDate() + weekOffset*7);
  selectedDate = new Date(bm);
  if (selectedDate.getDay()===0) selectedDate.setDate(selectedDate.getDate()+1);
  render();
}
function goToday() {
  weekOffset = 0; selectedDate = new Date(today);
  if (selectedDate.getDay()===0) selectedDate.setDate(selectedDate.getDate()+1);
  if (selectedDate.getDay()===6) selectedDate.setDate(selectedDate.getDate()+2);
  render();
}

// ═══ NOTES ═══
let currentNoteDay = null;
function openModal(dk) { currentNoteDay=dk; document.getElementById('noteInput').value=''; document.getElementById('modalOverlay').classList.add('open'); setTimeout(()=>document.getElementById('noteInput').focus(),350); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); currentNoteDay=null; }
function saveNote() {
  const v = document.getElementById('noteInput').value.trim(); if(!v) return;
  if(!notes[currentNoteDay]) notes[currentNoteDay]=[];
  notes[currentNoteDay].push(v);
  localStorage.setItem('cal_notes', JSON.stringify(notes));
  closeModal(); render();
}
function deleteNote(dk,i) { notes[dk].splice(i,1); localStorage.setItem('cal_notes',JSON.stringify(notes)); render(); }
document.getElementById('modalOverlay').addEventListener('click', function(e){if(e.target===this)closeModal();});
document.getElementById('noteInput').addEventListener('keydown', function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();saveNote();}});
document.getElementById('slotModalOverlay').addEventListener('click', function(e){if(e.target===this)closeSlotModal();});

// ═══ AI ═══
function openAI() { document.getElementById('aiPanel').classList.add('open'); if(!aiHistory.length) addAIMessage('bot','你好！我是你的 AI 小助手 🤖\n\n我可以幫你：\n• 📚 查看今日課表\n• 🍱 換早餐推薦\n• 💡 說有趣知識\n\n有什麼需要嗎？'); }
function closeAI() { document.getElementById('aiPanel').classList.remove('open'); }
function addAIMessage(role, text) {
  const c=document.getElementById('aiMessages'), d=document.createElement('div');
  d.className=`ai-msg ${role}`;
  d.innerHTML=`<div class="ai-msg-icon">${role==='bot'?'🤖':'😊'}</div><div class="ai-msg-bubble">${text.replace(/\n/g,'<br>')}</div>`;
  c.appendChild(d); c.scrollTop=c.scrollHeight;
  aiHistory.push({role:role==='bot'?'assistant':'user',content:text});
}
function showTyping(){const c=document.getElementById('aiMessages'),d=document.createElement('div');d.className='ai-msg bot';d.id='aiTyping';d.innerHTML=`<div class="ai-msg-icon">🤖</div><div class="ai-typing"><span></span><span></span><span></span></div>`;c.appendChild(d);c.scrollTop=c.scrollHeight;}
function removeTyping(){const e=document.getElementById('aiTyping');if(e)e.remove();}
function sendSuggestion(t){document.getElementById('aiInput').value=t;sendAI();}
async function sendAI() {
  const inp=document.getElementById('aiInput'), text=inp.value.trim(); if(!text)return;
  inp.value=''; inp.style.height='auto';
  addAIMessage('user',text); showTyping();
  const lower=text.toLowerCase(), dk=dateKey(selectedDate), dow=selectedDate.getDay();
  await new Promise(r=>setTimeout(r,400+Math.random()*300));
  removeTyping();
  if(lower.includes('課表')||lower.includes('今天課')){
    const wi=dow>=1&&dow<=5?dow-1:null;
    if(wi===null){addAIMessage('bot','今天是週末，沒有課喔！好好玩吧 🎉');return;}
    const sl=getScheduleForDay(dow,dk).filter(s=>s.type!=='break');
    let r=`📚 今天（週${DAYS_TW[dow]}）的課表：\n\n`;
    sl.forEach(s=>{const ic=s.type==='special'?'⭐':s.type==='lunch'?'🍱':s.type==='pbl'?'🚀':s.type==='free'?'✨':'📖';r+=`${ic} ${s.time} ${s.name}\n`;});
    addAIMessage('bot',r);return;
  }
  if(lower.includes('換早餐')){rerollBreakfast(dk);const b=BREAKFASTS[getBreakfast(dk)];addAIMessage('bot',`好的！已幫你換成：\n\n${b.emoji} ${b.name}\n🥛 ${b.drink}`);return;}
  if(lower.includes('知識')||lower.includes('冷知識')){const f=FALLBACK_FACTS[Math.floor(Math.random()*FALLBACK_FACTS.length)];addAIMessage('bot',`💡 有趣知識：\n\n${f.text}`);return;}
  if(/加油|我好累|不想|難過/.test(lower)){const e=['你已經很棒了！🌟','相信自己！💪','今天辛苦了 🌈'];addAIMessage('bot',e[Math.floor(Math.random()*e.length)]);return;}
  if(/笑話|好笑/.test(lower)){const j=['為什麼數學書很難過？因為裡面有太多問題了！😂','為什麼魚不會用電腦？因為怕被網住了！🐟'];addAIMessage('bot',j[Math.floor(Math.random()*j.length)]);return;}
  const em=encodeURIComponent(`（我在用每日行事曆App）${text}`);
  addAIMessage('bot','讓我帶你去 Claude 完整回答：');
  setTimeout(()=>{const c=document.getElementById('aiMessages'),d=document.createElement('div');d.className='ai-msg bot';d.innerHTML=`<div class="ai-msg-icon">🤖</div><a href="https://claude.ai/new?q=${em}" target="_blank" style="display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#e94560,#9b5de5);color:white;text-decoration:none;padding:10px 18px;border-radius:14px;font-size:13px;font-weight:700;font-family:'Space Mono',monospace;">🌐 用 Claude 繼續問 →</a>`;c.appendChild(d);c.scrollTop=c.scrollHeight;},300);
}
document.getElementById('aiInput').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';});
document.getElementById('aiInput').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendAI();}});

// ═══ INIT ═══
if(selectedDate.getDay()===0) selectedDate.setDate(selectedDate.getDate()+1);
if(selectedDate.getDay()===6) selectedDate.setDate(selectedDate.getDate()+2);
render();
</script>
